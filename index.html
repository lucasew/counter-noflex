<html xmlns="http://www.w3.org/1999/xhtml" class="top-left">
<head>
    <title>Counter</title>
    <meta charset="UTF-8">
</head>
<body class="top-left">
    <style>
        .top-left {
            position: relative;
            top: 0;
            left: 0;
        }
        body, html {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            position: fixed;
            top: 0;
            left: 0;
        }
        body {
            display: table;
        }
        .container {
            vertical-align: middle;
            text-align: center;
            display: table-cell;
        }
    </style>
    <div class="container top-left">
        <h1 id="counter">0</h1>
    </div>
    <script>
        function reportError(error) {
            console.error("Reported Error:", error);
            // Centralized error reporting
        }

        const COUNTER_INTERVAL_MS = 1000;

        class Counter {
            constructor(elementId) {
                this.elementId = elementId;
                this.value = 0;
            }

            increment() {
                try {
                    const element = document.getElementById(this.elementId);
                    if (!element) {
                        throw new Error(`Element with id '${this.elementId}' not found`);
                    }
                    element.innerText = String(this.value);
                    this.value++;
                    setTimeout(() => this.increment(), COUNTER_INTERVAL_MS);
                } catch (error) {
                    reportError(error);
                }
            }
        }

        try {
            const counter = new Counter("counter");
            counter.increment();
        } catch (error) {
            reportError(error);
        }
    </script>
</body>
</html>
