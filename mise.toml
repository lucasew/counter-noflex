[tools]
"ubi:lucasew/workspaced" = "0.1.5"

[tasks.install]
depends = ["install:*"]

[tasks."install:noop"]
run = "true"
hide = true

[tasks.lint]
run = "workspaced codebase lint"

[tasks.fmt]
run = "workspaced codebase format"

[tasks.test]
depends = ["test:*"]

[tasks."test:noop"]
run = "true"
hide = true

[tasks.codegen]
depends = ["codegen:*"]

[tasks."codegen:noop"]
run = "true"
hide = true

[tasks.ci]
depends = ["lint", "test"]
